<!DOCTYPE html>
<html lang="ru">
<head>

    <title>Открытка</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="images">
        <img src="img1.jpg" class="top-left">
        <img src="img2.jpg" class="top-right">
        <img src="img3.jpg" class="bottom-left">
        <img src="img4.jpg" class="bottom-right">
    </div>
    <div class="envelope-wrapper">
            <div class="envelope">
                <div class="envelope-back">
                    
                </div>
                    <div class="flap">
                        <div class="flap-front"></div>
                        <div class="flap-back"></div>
                    </div>
        
                    <div class="letter">
                        
                        <div class="text">
                            <h2>Привет, Душенька! 🌸</h2>
                                <p>В этот замечательный день весны — 8 марта, я поздравляю Тебя, Саша, с днём всех прекрасных дам!</p>
                                <p>Желаю тебе крепкого женского здоровья, больше улыбок в твою сторону и ясных дней в году.</p>
                                <p>Ты красавица и очень амбициозна, пускай все твои начинания приведут тебя к твоей мечте! ✨</p>
                        </div>
                    </div>

                    <div class="pocket">

                    </div>
            </div>
        
           
    </div>
    <div>
        <button>Открыть письмо 🌸</button>
    </div>

    <div id="confetti-container"></div>
    <script src="test.js" defer></script>
